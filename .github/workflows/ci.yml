name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx --yes html-validate "*.html"

  linkinator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx --yes linkinator "*.html" --recurse --skip "abstractiondeskqa.com"

  lighthouse-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: "./lighthouserc.json"
