<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AbstractionDeskQA · Core Measure Reference</title>

<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f6f8;
  --panel:#ffffff;
  --ink:#1c2430;
  --muted:#5f6b7a;
  --border:#d8dde3;
  --accent:#1f3c5b;
}

body.dark{
  --bg:#121417;
  --panel:#1b1f24;
  --ink:#e6e8eb;
  --muted:#a0a7b2;
  --border:#2b3138;
  --accent:#4c78a8;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Atkinson Hyperlegible',sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.6;
}

.wrapper{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
}

.sidebar{
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:18px;
}

.sidebar h2{
  font-family:'Source Serif 4',serif;
  font-size:15px;
  margin-bottom:12px;
}

.tag-group{
  margin-bottom:14px;
}

.tag-group h3{
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:6px;
}

.tag-list{
  display:none;
  padding-left:8px;
}

.tag-list button{
  display:block;
  width:100%;
  text-align:left;
  border:none;
  background:none;
  padding:4px 0;
  font-size:13px;
  cursor:pointer;
}

.tag-list button:hover{
  color:var(--accent);
}

.main{
  padding:24px 32px;
}

.header{
  margin-bottom:16px;
}

.header h1{
  font-family:'Source Serif 4',serif;
  font-size:22px;
  margin-bottom:4px;
}

.header p{
  color:var(--muted);
  font-size:14px;
}

.controls{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.controls button{
  font-size:13px;
  padding:6px 10px;
  border:1px solid var(--border);
  background:var(--panel);
  cursor:pointer;
}

.search{
  width:100%;
  padding:9px 12px;
  border:1px solid var(--border);
  margin-bottom:14px;
  font-size:14px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:12px 14px;
  margin-bottom:10px;
}

.card h4{
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

.card-content{
  display:none;
  margin-top:6px;
  font-size:14px;
}

.feedback{
  margin-top:28px;
  padding-top:18px;
  border-top:1px solid var(--border);
}

.feedback input{
  padding:8px;
  border:1px solid var(--border);
  width:260px;
  margin-right:6px;
}

.feedback button{
  padding:8px 12px;
  border:none;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

@media print{
  .sidebar,.controls,.feedback{display:none;}
  body{background:white;}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h2>Tags</h2>

<div class="tag-group">
<h3 onclick="toggleGroup(this)">Stroke Timing</h3>
<div class="tag-list">
<button>LKW</button>
<button>TLKW</button>
<button>Wake-Up Stroke</button>
<button>Found Down</button>
</div>
</div>

<div class="tag-group">
<h3 onclick="toggleGroup(this)">Thrombolytic</h3>
<div class="tag-list">
<button>TNK</button>
<button>tPA</button>
<button>Extended Window</button>
<button>Reason Not Given</button>
</div>
</div>

<div class="tag-group">
<h3 onclick="toggleGroup(this)">Comfort / EOL</h3>
<div class="tag-list">
<button>Comfort Measures</button>
<button>Hospice</button>
<button>POLST</button>
<button>Code Status</button>
</div>
</div>

<div class="tag-group">
<h3 onclick="toggleGroup(this)">Disposition</h3>
<div class="tag-list">
<button>Home</button>
<button>AMA</button>
<button>Transfer</button>
</div>
</div>

<div class="tag-group">
<h3 onclick="toggleGroup(this)">ED Timing</h3>
<div class="tag-list">
<button>Arrival</button>
<button>Admit</button>
<button>Boarding</button>
</div>
</div>

</div>

<div class="main">

<div class="header">
<h1>AbstractionDeskQA</h1>
<p>Core Measure abstraction reference for CMS and TJC.</p>
</div>

<div class="controls">
<button onclick="toggleDark()">Dark Mode</button>
<button onclick="toggleCompact()">Compact Mode</button>
<button onclick="window.print()">Print View</button>
<button>Recently Added</button>
<button>Frequently Misabstracted</button>
</div>

<input class="search" placeholder="Search scenario, abbreviation, data element...">

<div id="qa-container">

<!-- PASTE YOUR EXISTING Q&A DATA LOOP HERE -->

<div class="card">
<h4 onclick="toggleCard(this)">Example Question Title</h4>
<div class="card-content">
<p>Answer and abstraction guidance appear here.</p>
</div>
</div>

</div>

<div class="feedback">
<h3>Updates & Feedback</h3>
<input type="email" placeholder="Enter your email">
<button>Submit</button>
</div>

</div>
</div>

<script>
function toggleGroup(el){
  const list = el.nextElementSibling;
  list.style.display = list.style.display === "block" ? "none" : "block";
}

function toggleCard(el){
  const content = el.nextElementSibling;
  content.style.display = content.style.display === "block" ? "none" : "block";
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function toggleCompact(){
  document.body.classList.toggle("compact");
  document.querySelectorAll('.card').forEach(card=>{
    card.style.padding = document.body.classList.contains("compact") ? "8px 10px" : "12px 14px";
  });
}
</script>

</body>
</html>
