<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AbstractionDeskQA · Core Measure Reference</title>

<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f6f8;
  --panel:#ffffff;
  --ink:#1c2430;
  --muted:#5f6b7a;
  --border:#d8dde3;
  --accent:#1f3c5b;
}

body.dark{
  --bg:#121417;
  --panel:#1b1f24;
  --ink:#e6e8eb;
  --muted:#a0a7b2;
  --border:#2b3138;
  --accent:#4c78a8;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Atkinson Hyperlegible',sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.6;
}

.wrapper{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
}

.sidebar{
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:18px;
}

.sidebar h2{
  font-family:'Source Serif 4',serif;
  font-size:15px;
  margin-bottom:12px;
}

.tag-group{
  margin-bottom:14px;
}

.tag-group h3{
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:6px;
}

.tag-list{
  display:none;
  padding-left:8px;
}

.tag-list button{
  display:block;
  width:100%;
  text-align:left;
  border:none;
  background:none;
  padding:4px 0;
  font-size:13px;
  cursor:pointer;
}

.tag-list button.active{
  font-weight:700;
  color:var(--accent);
}

.main{
  padding:24px 32px;
}

.header{
  margin-bottom:16px;
}

.header h1{
  font-family:'Source Serif 4',serif;
  font-size:22px;
  margin-bottom:4px;
}

.header p{
  color:var(--muted);
  font-size:14px;
}

.controls{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.controls button{
  font-size:13px;
  padding:6px 10px;
  border:1px solid var(--border);
  background:var(--panel);
  cursor:pointer;
}

.search{
  width:100%;
  padding:9px 12px;
  border:1px solid var(--border);
  margin-bottom:14px;
  font-size:14px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:12px 14px;
  margin-bottom:10px;
}

.card h4{
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

.card-content{
  display:none;
  margin-top:6px;
  font-size:14px;
}

.feedback{
  margin-top:28px;
  padding-top:18px;
  border-top:1px solid var(--border);
}

.feedback input{
  padding:8px;
  border:1px solid var(--border);
  width:260px;
  margin-right:6px;
}

.feedback button{
  padding:8px 12px;
  border:none;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.compact .card{
  padding:8px 10px;
}

@media print{
  .sidebar,.controls,.feedback{display:none;}
  body{background:white;}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">
<h2>Tags</h2>

<div class="tag-group">
<h3 onclick="toggleGroup(this)">Stroke Timing</h3>
<div class="tag-list">
<button>LKW</button>
<button>in-house stroke</button>
<button>onset</button>
<button>arrival time</button>
</div>
</div>

<div class="tag-group">
<h3 onclick="toggleGroup(this)">Thrombolytic / Imaging</h3>
<div class="tag-list">
<button>CT scan</button>
<button>CT interpretation time</button>
</div>
</div>

<div class="tag-group">
<h3 onclick="toggleGroup(this)">Comfort / EOL</h3>
<div class="tag-list">
<button>POLST</button>
<button>CMO</button>
<button>comfort measures</button>
<button>ACP</button>
<button>code status</button>
<button>EOL</button>
</div>
</div>

</div>

<div class="main">

<div class="header">
<h1>AbstractionDeskQA</h1>
<p>Core Measure abstraction reference for CMS and TJC.</p>
</div>

<div class="controls">
<button onclick="toggleDark()">Dark Mode</button>
<button onclick="toggleCompact()">Compact Mode</button>
<button onclick="window.print()">Print View</button>
<button onclick="setFilter('recent')">Recently Added</button>
<button onclick="setFilter('frequent')">Frequently Misabstracted</button>
<button onclick="clearFilters()">Clear Filters</button>
</div>

<input class="search" placeholder="Search scenario, abbreviation, data element..." oninput="handleSearch(this.value)">

<div id="qa-container"></div>

<div class="feedback">
<h3>Updates & Feedback</h3>
<input type="email" placeholder="Enter your email">
<button>Submit</button>
</div>

</div>
</div>

<script>

const QA_DATA = [

{
id:1,
category:"Gray",
source:"TJC PMN guidance",
dataElement:"Comfort Measures Only",
question:"Patient has a POLST on file documenting DNR/DNI, but no physician note using 'comfort measures only' language. Does the POLST alone satisfy the Comfort Measures Only data element?",
answer:"A POLST/DNR documents resuscitation preferences, not necessarily a global comfort-focused care goal. CMO requires documentation that the entire care approach has shifted to comfort. Look for physician notes with CMO language, goals-of-care documentation, or a CMO order. Do not assume CMO from DNR status alone.",
tags:["POLST","CMO","comfort measures","ACP","code status","EOL"],
frequent:true,
added:"2026-02-01"
},

{
id:2,
category:"Gray",
source:"TJC Spec Manual v2026B",
dataElement:"Last Known Well",
question:"Patient arrives at ED at 2330 with fatigue and cough. Two hours later develops right-sided weakness. Did LKW occur prior to arrival?",
answer:"No. If LKW first occurred after arrival, this is an in-house stroke. The neurological event developed in-house and does not meet criteria for LKW prior to arrival.",
tags:["LKW","in-house stroke","onset","arrival time"],
frequent:false,
added:"2026-02-05"
},

{
id:3,
category:"Edge",
source:"TJC Spec Manual v2026B",
dataElement:"CT/MRI Scan Interpretation Time",
question:"Preliminary CT dictated at 2205. Final at 2220. Which interpretation time is used?",
answer:"2205. Interpretation time is the earliest documented interpretation. The preliminary read is valid and should be used.",
tags:["CT scan","CT interpretation time","arrival time"],
frequent:false,
added:"2026-02-10"
}

];

let selectedTags=new Set();
let searchTerm="";
let filterMode=null;

function render(){
const container=document.getElementById("qa-container");
container.innerHTML="";

let data=[...QA_DATA];

if(filterMode==="recent"){
data.sort((a,b)=>new Date(b.added)-new Date(a.added));
}
if(filterMode==="frequent"){
data=data.filter(i=>i.frequent);
}

data=data.filter(item=>{
const textMatch=(item.question+item.answer+item.tags.join(" "))
.toLowerCase().includes(searchTerm.toLowerCase());

const tagMatch=selectedTags.size===0||
[...selectedTags].every(tag=>item.tags.includes(tag));

return textMatch && tagMatch;
});

data.forEach(item=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<h4 onclick="toggleCard(this)">${item.question}</h4>
<div class="card-content">
<p><strong>${item.dataElement}</strong></p>
<p>${item.answer}</p>
<p style="color:var(--muted);font-size:13px;margin-top:6px;">
${item.source} · ${item.category}
</p>
</div>
`;
container.appendChild(card);
});
}

function toggleCard(el){
const content=el.nextElementSibling;
content.style.display=content.style.display==="block"?"none":"block";
}

function toggleGroup(el){
const list=el.nextElementSibling;
list.style.display=list.style.display==="block"?"none":"block";
}

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("darkMode",document.body.classList.contains("dark"));
}

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark");
}

function toggleCompact(){
document.body.classList.toggle("compact");
}

function handleSearch(value){
searchTerm=value;
render();
}

document.querySelectorAll(".tag-list button").forEach(btn=>{
btn.addEventListener("click",()=>{
const tag=btn.textContent;
if(selectedTags.has(tag)){
selectedTags.delete(tag);
btn.classList.remove("active");
}else{
selectedTags.add(tag);
btn.classList.add("active");
}
render();
});
});

function setFilter(type){
filterMode=type;
render();
}

function clearFilters(){
selectedTags.clear();
filterMode=null;
searchTerm="";
document.querySelector(".search").value="";
document.querySelectorAll(".tag-list button").forEach(b=>b.classList.remove("active"));
render();
}

render();

</script>

</body>
</html>
